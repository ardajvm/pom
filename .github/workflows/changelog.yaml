name: Release Drafter

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Run Release Drafter
        uses: release-drafter/release-drafter@v5
        with:
          config-name: 'release-drafter.yml' 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
